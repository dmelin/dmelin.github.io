<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>DrawTector</title>
</head>

<body class="text-dark">

    <div id="main" class="p-3 text-center">
        <div class="input-group">
            <input type="text" class="form-control" placeholder="Enter thing word" value="Dick" id="theWord">
            <button type="button" class="btn btn-dark" id="theButton">GO</button>
            <button type="button" class="btn btn-light" id="goCrazy">Crazy</button>
        </div>
        <p class="small">enter "random" to get a random word</p>
        <div id="theResult" class="mt-5 fs-2 alert alert-info gone"></div>
        <div id="theMethod" class="mt-1 p-2 fs-5 alert alert-warning gone"></div>
        <div id="theClock" class="mt-1 p-2 fs-3 alert alert-success gone">60</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="./assets/js/actions.js" type="text/javascript"></script>
</body>

</html>
