<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Random Draw</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #app {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            background: white;
            border-radius: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            #app {
                max-width: 375px;
                height: 667px;
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            }
        }

        .header {
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .controls {
            display: flex;
            align-items: stretch;
            gap: 0;
            margin: 0;
        }

        .btn {
            background: white;
            color: #667eea;
            border: none;
            border-radius: 0;
            padding: 15px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #f0f0f0;
        }

        .btn:active {
            background: #e0e0e0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .category-select {
            flex: 1;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 0;
            padding: 15px 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23667eea' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 20px;
            padding-right: 40px;
        }

        .category-select:hover {
            background-color: #f0f0f0;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23667eea' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        }

        .word-display {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 0;
            margin: 0;
            position: relative;
        }

        .content-centered {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .countdown {
            font-size: 120px;
            font-weight: 700;
            color: #667eea;
            animation: countdownPulse 0.5s ease;
        }

        @keyframes countdownPulse {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .image-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            padding: 0;
            margin: 0;
        }

        .image-container.landscape {
            transform: rotate(90deg);
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        .loading {
            font-size: 18px;
            color: #667eea;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .error {
            color: #e74c3c;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="controls">
                <select class="category-select" v-model="selectedCategory">
                    <option value="all">All</option>
                    <option v-for="category in categories" :key="category" :value="category">
                        {{ category }}
                    </option>
                </select>
                <button class="btn" @click="startRandomizer" :disabled="isRunning">
                    Get word
                </button>
            </div>
            <div class="word-display">
                {{ displayWord }}
            </div>
        </div>

        <div :class="imageUrl ? 'content' : 'content-centered'">
            <div v-if="countdown !== null" class="countdown" :key="countdown">
                {{ countdown }}
            </div>
            <div v-else-if="imageUrl" class="image-container" :class="{ landscape: isLandscape }">
                <img :src="imageUrl" :alt="selectedWord" @error="handleImageError" @dblclick="nextImage" @load="checkImageOrientation">
            </div>
            <div v-else-if="loading" class="loading">
                Loading image...
            </div>
            <div v-else-if="error" class="error">
                {{ error }}
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    words: {
                        'Animals': [
                            'Cat', 'Dog', 'Elephant', 'Lion', 'Tiger', 'Bear', 'Penguin', 'Dolphin',
                            'Whale', 'Shark', 'Eagle', 'Owl', 'Parrot', 'Butterfly', 'Bee', 'Spider',
                            'Snake', 'Frog', 'Turtle', 'Rabbit', 'Horse', 'Wolf', 'Fox', 'Deer',
                            'Squirrel', 'Raccoon', 'Monkey', 'Giraffe', 'Zebra', 'Kangaroo',
                            'Koala', 'Panda', 'Crocodile', 'Flamingo', 'Peacock', 'Seahorse'
                        ],
                        'Farm Life': [
                            'Cow', 'Pig', 'Sheep', 'Goat', 'Chicken', 'Duck', 'Rooster', 'Turkey',
                            'Horse', 'Donkey', 'Barn', 'Tractor', 'Haystack', 'Windmill', 'Fence',
                            'Scarecrow', 'Wheelbarrow', 'Pitchfork', 'Bucket', 'Well', 'Silo'
                        ],
                        'Vehicles': [
                            'Car', 'Bicycle', 'Motorcycle', 'Bus', 'Train', 'Airplane', 'Helicopter',
                            'Boat', 'Ship', 'Sailboat', 'Submarine', 'Rocket', 'Truck', 'Taxi',
                            'Ambulance', 'Fire Truck', 'Police Car', 'Scooter', 'Skateboard',
                            'Hot Air Balloon', 'Jet', 'Yacht', 'Canoe', 'Kayak', 'RV'
                        ],
                        'Environments': [
                            'Mountain', 'Volcano', 'Ocean', 'Lake', 'River', 'Waterfall', 'Island',
                            'Beach', 'Forest', 'Desert', 'Cave', 'Jungle', 'Canyon', 'Glacier',
                            'Meadow', 'Swamp', 'Valley', 'Prairie', 'Tundra', 'Cliff', 'Reef'
                        ],
                        'Buildings': [
                            'House', 'Castle', 'Tower', 'Bridge', 'Lighthouse', 'Church', 'Pyramid',
                            'Tent', 'Igloo', 'Treehouse', 'Skyscraper', 'Factory', 'Stadium',
                            'Temple', 'Monument', 'Cottage', 'Mansion', 'Cabin', 'Windmill'
                        ],
                        'Gaming/Tech': [
                            'Computer', 'Laptop', 'Phone', 'Tablet', 'Camera', 'Television', 'Radio',
                            'Headphones', 'Speaker', 'Remote Control', 'Game Controller', 'Mouse',
                            'Keyboard', 'USB Drive', 'Joystick', 'VR Headset', 'Arcade Machine',
                            'Console', 'Drone', 'Robot', 'Smartwatch'
                        ],
                        'Appliances': [
                            'Refrigerator', 'Oven', 'Microwave', 'Toaster', 'Blender', 'Coffee Maker',
                            'Washing Machine', 'Dryer', 'Dishwasher', 'Vacuum', 'Iron', 'Fan',
                            'Air Conditioner', 'Heater', 'Kettle', 'Mixer', 'Trash Can'
                        ],
                        'People': [
                            'Baby', 'Child', 'Teenager', 'Adult', 'Elder', 'King', 'Queen', 'Prince',
                            'Princess', 'Knight', 'Pirate', 'Cowboy', 'Astronaut', 'Doctor', 'Chef',
                            'Firefighter', 'Police Officer', 'Teacher', 'Farmer', 'Artist', 'Musician',
                            'Dancer', 'Athlete', 'Scientist', 'Wizard', 'Ninja', 'Superhero'
                        ],
                        'Nature': [
                            'Tree', 'Flower', 'Rose', 'Sunflower', 'Cactus', 'Palm Tree', 'Cloud',
                            'Rainbow', 'Sun', 'Moon', 'Star', 'Lightning', 'Snowflake', 'Leaf',
                            'Mushroom', 'Rock', 'Shell', 'Pinecone', 'Acorn', 'Branch', 'Log'
                        ],
                        'Food': [
                            'Apple', 'Banana', 'Orange', 'Strawberry', 'Watermelon', 'Pineapple',
                            'Grapes', 'Pizza', 'Burger', 'Hotdog', 'Sandwich', 'Taco', 'Sushi',
                            'Bread', 'Cake', 'Cookie', 'Donut', 'Ice Cream', 'Cupcake', 'Chocolate',
                            'Candy', 'Lollipop', 'Popcorn', 'Cheese', 'Egg', 'Carrot', 'Corn'
                        ],
                        'Sports': [
                            'Ball', 'Football', 'Basketball', 'Baseball', 'Tennis Ball', 'Soccer Ball',
                            'Golf Ball', 'Bowling Ball', 'Bat', 'Racket', 'Surfboard', 'Snowboard',
                            'Skis', 'Kite', 'Frisbee', 'Yo-yo', 'Jump Rope', 'Dumbbell', 'Trophy',
                            'Medal', 'Fishing Rod', 'Hockey Stick', 'Helmet', 'Net'
                        ],
                        'Musical Instruments': [
                            'Guitar', 'Piano', 'Drum', 'Trumpet', 'Violin', 'Saxophone', 'Flute',
                            'Harp', 'Accordion', 'Banjo', 'Harmonica', 'Tambourine', 'Microphone',
                            'Xylophone', 'Clarinet', 'Trombone', 'Ukulele', 'Cello', 'Cymbals'
                        ],
                        'Tools': [
                            'Hammer', 'Screwdriver', 'Wrench', 'Saw', 'Drill', 'Ladder', 'Shovel',
                            'Rake', 'Scissors', 'Paintbrush', 'Axe', 'Flashlight', 'Toolbox',
                            'Anchor', 'Key', 'Lock', 'Magnet', 'Compass', 'Binoculars', 'Pliers',
                            'Tape Measure', 'Level', 'Nail', 'Screw'
                        ],
                        'Household': [
                            'Chair', 'Table', 'Sofa', 'Bed', 'Lamp', 'Clock', 'Mirror', 'Pillow',
                            'Blanket', 'Rug', 'Curtain', 'Vase', 'Picture Frame', 'Candle', 'Basket',
                            'Bucket', 'Broom', 'Door', 'Window', 'Mailbox', 'Doorbell'
                        ],
                        'Kitchen': [
                            'Fork', 'Spoon', 'Knife', 'Plate', 'Bowl', 'Cup', 'Mug', 'Glass',
                            'Bottle', 'Teapot', 'Pan', 'Pot', 'Kettle', 'Cutting Board', 'Strainer',
                            'Whisk', 'Spatula', 'Grater', 'Rolling Pin', 'Oven Mitt'
                        ],
                        'Clothing': [
                            'Hat', 'Cap', 'Glasses', 'Sunglasses', 'Tie', 'Scarf', 'Glove', 'Shoe',
                            'Boot', 'Sandal', 'Umbrella', 'Bag', 'Purse', 'Suitcase', 'Backpack',
                            'Jacket', 'Shirt', 'Pants', 'Dress', 'Socks', 'Belt', 'Watch'
                        ],
                        'Office/School': [
                            'Book', 'Notebook', 'Pencil', 'Pen', 'Eraser', 'Ruler', 'Stapler',
                            'Paperclip', 'Folder', 'Envelope', 'Stamp', 'Tape', 'Calculator',
                            'Globe', 'Microscope', 'Telescope', 'Magnifying Glass', 'Backpack',
                            'Scissors', 'Glue', 'Marker', 'Crayon', 'Desk', 'Chalkboard'
                        ],
                        'Toys': [
                            'Teddy Bear', 'Doll', 'Balloon', 'Lego', 'Puzzle', 'Dice', 'Playing Card',
                            'Chess Piece', 'Kite', 'Robot', 'Yo-yo', 'Toy Car', 'Action Figure',
                            'Board Game', 'Rubiks Cube', 'Spinning Top', 'Jack-in-the-box'
                        ],
                        'Fantasy': [
                            'Dragon', 'Unicorn', 'Phoenix', 'Mermaid', 'Fairy', 'Wizard Hat', 'Wand',
                            'Crystal Ball', 'Potion Bottle', 'Treasure Chest', 'Crown', 'Sword',
                            'Shield', 'Bow and Arrow', 'Armor', 'Magic Carpet', 'Cauldron', 'Scepter'
                        ],
                        'Space': [
                            'Rocket', 'Satellite', 'Planet', 'Asteroid', 'Comet', 'Telescope',
                            'Spaceship', 'Space Station', 'Astronaut Helmet', 'UFO', 'Mars Rover',
                            'Meteor', 'Black Hole', 'Galaxy', 'Constellation'
                        ],
                        'Miscellaneous': [
                            'Bell', 'Flag', 'Coin', 'Diamond', 'Pearl', 'Hourglass', 'Cage', 'Barrel',
                            'Wheel', 'Gear', 'Spring', 'Chain', 'Rope', 'Net', 'Parachute', 'Gift Box',
                            'Jar', 'Bottle', 'Candle', 'Match', 'Lantern', 'Torch', 'Map', 'Scroll'
                        ]
                    },
                    selectedCategory: 'all',
                    displayWord: '',
                    selectedWord: '',
                    isRunning: false,
                    countdown: null,
                    imageUrl: '',
                    images: [],
                    currentImageIndex: 0,
                    isLandscape: false,
                    loading: false,
                    error: '',
                    unsplashAccessKey: 'tr6xy6NkJFZUX6a_9Ml8n1uxt1ijy9c_7tmcV2zqxyk'
                };
            },
            computed: {
                categories() {
                    return Object.keys(this.words);
                },
                currentWordList() {
                    if (this.selectedCategory === 'all') {
                        return Object.values(this.words).flat();
                    }
                    return this.words[this.selectedCategory] || [];
                }
            },
            methods: {
                startRandomizer() {
                    this.isRunning = true;
                    this.countdown = null;
                    this.imageUrl = '';
                    this.error = '';
                    this.loading = false;

                    const wordList = this.currentWordList;

                    // Start at a random position
                    let currentIndex = Math.floor(Math.random() * wordList.length);
                    let interval = 50; // Start fast
                    let iterations = 0;
                    // Random number of iterations (between 25-40)
                    const maxIterations = 25 + Math.floor(Math.random() * 16);

                    const cycle = () => {
                        this.displayWord = wordList[currentIndex];
                        currentIndex = (currentIndex + 1) % wordList.length;
                        iterations++;

                        // Slow down gradually
                        if (iterations > maxIterations * 0.6) {
                            interval += 30;
                        }

                        if (iterations < maxIterations) {
                            setTimeout(cycle, interval);
                        } else {
                            // Final word is wherever we ended up
                            this.selectedWord = this.displayWord;
                            this.startCountdown();
                        }
                    };

                    cycle();
                },
                startCountdown() {
                    const counts = [3, 2, 1, 0];
                    let index = 0;

                    const count = () => {
                        this.countdown = counts[index];
                        index++;

                        if (index < counts.length) {
                            setTimeout(count, 1000);
                        } else {
                            setTimeout(() => {
                                this.countdown = null;
                                this.fetchImage();
                            }, 1000);
                        }
                    };

                    count();
                },
                async fetchImage() {
                    this.loading = true;
                    this.isLandscape = false;

                    try {
                        // Using Unsplash API - fetch 10 images
                        const response = await fetch(
                            `https://api.unsplash.com/search/photos?query=${encodeURIComponent(this.selectedWord)}&per_page=10&client_id=${this.unsplashAccessKey}`
                        );

                        if (!response.ok) {
                            throw new Error('Failed to fetch image');
                        }

                        const data = await response.json();

                        if (data.results && data.results.length > 0) {
                            this.images = data.results.map(img => img.urls.regular);
                            this.currentImageIndex = 0;
                            this.imageUrl = this.images[0];
                        } else {
                            this.error = 'No image found for this word';
                        }
                    } catch (err) {
                        this.error = 'Error loading image. Please check your API key.';
                        console.error(err);
                    } finally {
                        this.loading = false;
                        this.isRunning = false;
                    }
                },
                nextImage() {
                    if (this.images.length > 0) {
                        this.isLandscape = false;
                        this.currentImageIndex = (this.currentImageIndex + 1) % this.images.length;
                        this.imageUrl = this.images[this.currentImageIndex];
                    }
                },
                checkImageOrientation(event) {
                    const img = event.target;
                    this.isLandscape = img.naturalWidth > img.naturalHeight;
                },
                handleImageError() {
                    this.error = 'Failed to load image';
                    this.imageUrl = '';
                    this.isRunning = false;
                }
            },
            mounted() {
                // Lock screen orientation to portrait on mobile devices
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('portrait').catch(() => {
                        // Orientation lock may fail in some browsers/contexts
                    });
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
