<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Melin</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

    <div id="container">
        <div id="icons">
            <button class="icon-button bordered-frame" data-modal="home">
                <span class="material-symbols-outlined">home</span>
            </button>
            <button class="icon-button bordered-frame" data-modal="favorite">
                <span class="material-symbols-outlined">favorite</span>
            </button>
            <button class="icon-button bordered-frame" data-modal="settings">
                <span class="material-symbols-outlined">settings</span>
            </button>
        </div>

        <div id="modal-home" class="modal">
            <div class="modal-content bordered-frame">
                <h2>Home</h2>
                <p>This is the home modal content.</p>
            </div>
        </div>

        <div id="modal-favorite" class="modal">
            <div class="modal-content bordered-frame">
                <h2>Favorite</h2>
                <p>This is the favorite modal content.</p>
            </div>
        </div>

        <div id="modal-settings" class="modal">
            <div class="modal-content bordered-frame">
                <h2>Settings</h2>
                <p>This is the settings modal content.</p>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
